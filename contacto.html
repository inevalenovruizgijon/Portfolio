<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Iaroslav Nevalenov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/scss/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">PORTAFOLIO</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Sobre mí</a>
                    <a class="nav-link" href="proyectos.html">Proyectos</a>
                    <a class="nav-link active" href="contacto.html">Contacto</a>
                </div>
            </div>
        </nav>
    </header>

   <section class="contacto container section">
    <h2 class="contacto__titulo">Contacto</h2>
    
    <div class="contacto__grid">
        <!-- Columna de Información Visual/RRSS -->
        <div class="contacto__info">
            <h3 class="contacto__subtitulo">¿Hablamos?</h3>
            <p class="contacto__texto">
                Si tienes un proyecto en mente o quieres mejorar tu presencia digital, no dudes en escribirme.
            </p>
            
            <div class="contacto__detalles">
                <div class="contacto__item">
                    <i class="bi bi-envelope-at"></i>
                    <span>hola@tuweb.com</span>
                </div>
                <div class="contacto__item">
                    <i class="bi bi-geo-alt"></i>
                    <span>Madrid, España</span>
                </div>
            </div>

            <div class="contacto__redes">
                <a href="#" class="contacto__social"><i class="bi bi-linkedin"></i></a>
                <a href="#" class="contacto__social"><i class="bi bi-github"></i></a>
                <a href="#" class="contacto__social"><i class="bi bi-instagram"></i></a>
            </div>
        </div>

        <!-- Columna del Formulario con la frase superior -->
        <form class="formulario">
            <div class="formulario__header">
                <h4 class="formulario__frase">Contact Me</h4>
                <p class="formulario__subfrase">Responderé a tu mensaje en menos de 24h.</p>
            </div>

            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu Nombre completo" required>
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" placeholder="Cuéntame sobre tu proyecto..."></textarea>
            </div>

            <button type="submit" class="formulario__submit">Enviar Mensaje</button>
        </form>
    </div>
</section>

    <footer class="bg-dark text-white py-3 text-center">
        <div class="container">
            <p class="mb-0 small">&copy; 2026 Iaroslav Nevalenov</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
