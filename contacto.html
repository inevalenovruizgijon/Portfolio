<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Iaroslav Nevalenov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/scss/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">PORTAFOLIO</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Sobre mí</a>
                    <a class="nav-link" href="proyectos.html">Proyectos</a>
                    <a class="nav-link active" href="contacto.html">Contacto</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 d-flex align-items-center py-3">
        <div class="container">
            <div class="row g-4 align-items-center">
                
                <div class="col-md-5">
                    <h1 class="fw-bold h2 mb-2">¿Tienes un proyecto?</h1>
                    <p class="text-muted mb-4">Estoy disponible para nuevos desafíos.</p>
                    
                    <div class="d-flex align-items-center">
                        <div class="bg-primary text-white p-2 rounded-circle me-3" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                            <span><i class="fa-solid fa-envelope"></i></span>
                        </div>
                        <div>
                            <p class="mb-0 fw-bold small text-uppercase">Email</p>
                            <a href="mailto:nevalenov.iaroslav@gmail.com" class="text-decoration-none fw-bold">nevalenov.iaroslav@gmail.com</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <form class="formulario shadow-sm p-3 bg-white rounded" id="formContacto">
                        <div class="campo mb-2">
                            <label for="nombre" class="fw-bold small">Nombre *</label>
                            <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" required>
                        </div>

                        <div class="campo mb-2">
                            <label for="email" class="fw-bold small">Correo electrónico *</label>
                            <input type="email" id="email" class="form-control" placeholder="nombre@correo.com" required>
                        </div>

                        <div class="campo mb-3">
                            <label for="mensaje" class="fw-bold small">Mensaje</label>
                            <textarea id="mensaje" rows="3" class="form-control" placeholder="Cuéntame tu idea..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Enviar Mensaje</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-3 text-center">
        <div class="container">
            <p class="mb-0 small">&copy; 2026 Iaroslav Nevalenov. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
